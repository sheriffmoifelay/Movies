<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Log In | Movies Hub </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .navbar-brand b{
            font-size: 35px;
            color: blue;
        }

        #form{
            display: flex;
            justify-content: center;
            margin: 50px auto;
        }

        button a{
            text-decoration: none;
            color: white;
            transition: 1s;
        }

        button a:hover{
            color: rgb(209, 192, 192);
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand" href="#"> 
          <b> MOVIES HUBS </b>       
      </a>
      <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index.html"> 
                <i id="home" class="fa-solid fa-clapperboard"></i>
                Home 
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
    <form class="row g-3 needs-validation" novalidate id="form">
        <div class="col-md-4">
            <label for="validationCustom01" class="form-label"> User Name </label>
            <input type="text" class="form-control" id="validationCustom01" placeholder="ex: @sheriffmoifelay" required>
            <div class="valid-feedback">
            Looks good!
            </div>
        </div>
        <div class="col-md-4">
            <label for="validationCustom01" class="form-label"> Password </label>
            <input type="text" class="form-control" id="validationCustom01" placeholder="*****************" required>
            <div class="valid-feedback">
            Looks good!
            </div>
        </div>
        <div class="col-12" style="text-align: center;">
            <button class="btn btn-primary" type="submit"> Log Into Account </button>
            <button class="btn btn-primary" type="submit"> <a href="sign.html"> SignUp Instead? </a> </button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
