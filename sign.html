    <form class="row g-3 needs-validation" novalidate id="form">
        <div class="col-md-4">
            <label for="validationCustom01" class="form-label"> First Name, | & Middle Name </label>
            <input type="text" class="form-control" id="validationCustom01" placeholder="ex: Moifelay | Moifelay Moussa" required>
            <div class="valid-feedback">
            Looks good!
            </div>
        </div>
        <div class="col-md-4">
            <label for="validationCustom02" class="form-label"> Last/Surname Name </label>
            <input type="text" class="form-control" id="validationCustom02" placeholder="ex: Sheriff" required>
            <div class="valid-feedback">
            Looks good!
            </div>
        </div>
        <div class="col-md-4">
            <label for="validationCustomUsername" class="form-label"> Username </label>
            <div class="input-group has-validation">
            <span class="input-group-text" id="inputGroupPrepend">@</span>
            <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" placeholder="ex: @sheriffMoifelay" required>
            <div class="invalid-feedback">
                Please choose a username!
            </div>
            </div>
        </div>
        <div class="col-md-6">
            <label for="validationCustom03" class="form-label"> City </label>
            <input type="text" class="form-control" id="validationCustom03" placeholder="ex: Kasoa" required>
            <div class="invalid-feedback">
            Please provide a valid city!
            </div>
        </div>
        <div class="col-md-3">
            <label for="validationCustom04" class="form-label"> Region </label>
            <select class="form-select" id="validationCustom04" required>
            <option selected disabled value=""> Choose... </option>
            <option> Ahafo </option>
            <option> Ashanti </option>
            <option> Bono </option>
            <option> Bono East </option>
            <option> Central </option>
            <option> Eastern </option>
            <option> Greater Accra </option>
            <option> North East </option>
            <option> Northern </option>
            <option> Oti </option>
            <option> Savannah </option>
            <option> Upper East </option>
            <option> Upper West </option>
            <option> Volta </option>
            <option> Western </option>
            <option> Western North </option>
            </select>
            <div class="invalid-feedback">
            Please select a valid Region!
            </div>
        </div>
        <div class="col-md-3">
            <label for="validationCustom05" class="form-label"> Password </label>
            <input type="text" class="form-control" id="validationCustom05" placeholder="*********************" required>
            <div id="passwordHelpBlock" class="form-text">
                Your password must be 6 -10 characters long, both letters and numbers, one upper letter, no spaces, special characters, or emoji.
            </div>
        </div>
        <div class="col-12">
            <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
            <label class="form-check-label" for="invalidCheck">
                Yes, I agree to the <a href="#" style="text-decoration: none;"> Terms & Conditions </a>
            </label>
            <div class="invalid-feedback">
                You must agree before submitting.
            </div>
            </div>
        </div>
        <div class="col-12" style="text-align: center;">
            <button class="btn btn-primary" type="submit"> Create Account </button>
            <button class="btn btn-primary" type="submit"> <a href="login.html"> Login Instead? </a> </button>
        </div>
    </form>
